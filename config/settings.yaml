symbols:
  - "9432.T"  # NTT
  - "7203.T"  # トヨタ
  - "6758.T"  # ソニー
  - "8306.T"  # 三菱UFJ
  - "6861.T"  # キーエンス
  - "9984.T"  # ソフトバンクG
  - "6501.T"  # 日立
  - "8035.T"  # 東京エレクトロン
  - "4063.T"  # 信越化学
  - "7741.T"  # HOYA

range_detection:
  lookback_days: 60
  bb_width_threshold: 0.08
  atr_ratio_threshold: 0.02
  range_containment_threshold: 0.70

backtest:
  initial_cash: 1000000
  commission: 0.001
  start_date: "2025-03-01"
  end_date: "2026-03-20"

kabu_api:
  host: "localhost"
  port: 18081  # デモ
  password: "${KABU_API_PASSWORD}"

trading:
  mode: "paper"  # paper or live
  position_size_pct: 0.10
  stop_loss_pct: 0.03
  max_positions: 3
  max_per_stock: 500000  # 1銘柄最大50万円
  interval_seconds: 300
  stale_order_minutes: 30

notification:
  discord_webhook_url: "${DISCORD_WEBHOOK_URL}"
  daily_report_time: "15:35"

robustness:
  walk_forward_min_pf: 1.0
  sensitivity_max_range: 0.15
  monte_carlo_max_dd: 0.30
  monte_carlo_simulations: 1000

theme_analysis:
  enabled: true
  check_interval_minutes: 30
  feeds:
    - name: "reuters_jp"
      url: "https://assets.wor.jp/rss/rdf/reuters/top.rdf"
    - name: "nikkei"
      url: "https://assets.wor.jp/rss/rdf/nikkei/news.rdf"

volume_spike:
  enabled: true
  threshold_multiplier: 2.0
  lookback_days: 20

analysis:
  mode: "multi_agent"  # "single" or "multi_agent"
  agent_weights:
    technical: 0.30
    fundamental: 0.20
    sentiment: 0.15
    volume: 0.20
    theme: 0.15
  buy_threshold: 0.3
  sell_threshold: -0.3

deflated_sr:
  enabled: true
  significance_threshold: 0.95
  trial_count_file: "data/trial_count.json"

j_quants:
  enabled: true
  refresh_token: "${JQUANTS_REFRESH_TOKEN}"
  base_url: "https://api.jquants.com/v1"

x_sentiment:
  enabled: true
  api_key: "${GROK_API_KEY}"
  fallback_to_web: true
  search_keywords: ["投資", "株", "決算", "上方修正", "下方修正"]

logging:
  level: "INFO"
  log_dir: "data/logs"
